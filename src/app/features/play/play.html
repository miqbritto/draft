<div class="main-section">
  <aside class="panel panel--left">
    <div class="logo-card">
      <h2 class="card_title">MAJOR</h2>
      <h2 class="card_subtitle">
        {{selectedMajor()?.name}}
      </h2>
      <div class="logo-card__ghost">
        @if (selectedMajor(); as major) {
        <img
        [src]="major.icon"
        >
        }
      </div>
      <div class="logo-card__ghost">
        @if (selectedTeam(); as team) {
          <img
          [src]="team.logo"
          >
        }
      </div>
      <h2 class="card_subtitle">{{selectedTeam()?.name}}</h2>
    </div>

    <h2 class="card_title">Catálogo</h2>
    <div class="catalog">
      <div class="catalog-card">
        <h2 class="catalog-number">{{majorService.majors.length}}</h2>
        <h3 class="catalog_subtitle">Majors</h3>
      </div>

      <div class="catalog-card">
        <h2 class="catalog-number">{{teamService.teams.length}}</h2>
        <h3 class="catalog_subtitle">Times</h3>
      </div>
    </div>

    <button type="button" class="draft-btn" (click)="drawn()">SORTEAR</button>
  </aside>

  <section class="panel panel--center">
    <div class="container-center">
      <h1 class="card_title">PRONTO PRA SORTEAR</h1>
    </div>
  </section>
  <section class="panel panel--right"></section>
</div>
